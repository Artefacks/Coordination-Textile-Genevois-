<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="css/relais.css">
  <title>Reviva — Créer un outfit</title>
</head>
<body class="rt-has-tabbar" data-page="outfit-form">
  <p class="brand-row"><a href="index.html" class="brand" aria-label="Reviva accueil"><span class="brand-emoji" aria-hidden="true">🧵</span> <span class="brand-name">Reviva</span></a></p>
  <header>
    <nav>
      <p><a href="garde-robe-outfits.html">Mes outfits</a> — <a href="garde-robe.html">Garde-robe</a> — <a href="carte.html">Carte</a></p>
    </nav>
    <h1>Créer un outfit</h1>
    <p class="rt-page-hint">Choisis des pièces, nomme l’outfit → ensuite la toile pour le visuel.</p>
  </header>
  <main>
    <form id="outfit-form-el" action="#" method="get">
      <fieldset>
        <legend>Articles</legend>
        <div id="outfit-garment-checkboxes"></div>
      </fieldset>
      <p>
        <label for="nom-outfit">Nom de l’outfit</label>
        <input id="nom-outfit" name="nom-outfit" type="text">
      </p>
      <p>
        <button type="submit" id="btn-outfit-save" data-action="list">Enregistrer</button>
      </p>
      <p>
        <button type="submit" id="btn-outfit-save-share" data-action="share">Enregistrer et partager</button>
      </p>
    </form>
  </main>
  <script defer src="js/wardrobe-store.js"></script>
  <script defer src="js/wardrobe-pages.js"></script>
  <nav class="rt-tabbar" aria-label="Raccourcis">
    <a href="garde-robe.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">👔</span><span class="rt-tabbar__label">Garde-robe</span></a>
    <a href="reparer.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🧵</span><span class="rt-tabbar__label">Réparer</span></a>
    <a href="donner.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🎁</span><span class="rt-tabbar__label">Donner</span></a>
    <a href="marketplace.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🏪</span><span class="rt-tabbar__label">Marketplace</span></a>
    <a href="profil.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">👤</span><span class="rt-tabbar__label">Profil</span></a>
  </nav>
</body>
</html>
