<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="css/relais.css">
  <title>Relais Textile — Don — questions</title>
</head>
<body class="rt-has-tabbar">
  <p class="brand-row"><a href="index.html" class="brand" aria-label="Relais Textile accueil"><span class="brand-emoji" aria-hidden="true">🧵</span> <span class="brand-name">Relais Textile</span></a></p>
  <header>
    <nav>
      <p><a href="donner.html">Menu Donner</a> — <a href="carte.html">Carte</a></p>
    </nav>
    <h1>Questions</h1>
    <p class="rt-page-hint">Réponds pour compléter le dossier (parcours « nouveau vêtement » uniquement).</p>
  </header>
  <main>
    <form action="#" method="get">
      <fieldset>
        <legend>Informations sur le vêtement</legend>
        <p>
          <label for="annee-nettoyage">Quand est la dernière fois qu’il a été nettoyé ? (année)</label>
          <input id="annee-nettoyage" name="annee-nettoyage" type="number" inputmode="numeric" min="1990" max="2035" step="1" placeholder="ex. 2025">
        </p>
        <p>
          <label for="annee-achat">Année d’achat</label>
          <input id="annee-achat" name="annee-achat" type="number" inputmode="numeric" min="1990" max="2035" step="1" placeholder="ex. 2022">
        </p>
        <p>
          <label for="prix-estime">Estimation du prix (valeur d’achat ou actuelle)</label>
          <input id="prix-estime" name="prix-estime" type="number" min="0" step="0.01" placeholder="ex. 45">
          <span aria-hidden="true"> €</span>
        </p>
        <p>
          <label for="matiere">Matière et composition</label>
          <textarea id="matiere" name="matiere" rows="3" placeholder="ex. 80 % coton, 20 % polyester — selon étiquette ou estimation"></textarea>
        </p>
      </fieldset>
      <p>
        <button type="submit" formaction="donner-analyse-donabilite.html">Continuer — analyse de donabilité</button>
      </p>
    </form>
  </main>
  <nav class="rt-tabbar" aria-label="Raccourcis">
    <a href="garde-robe.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">👔</span><span class="rt-tabbar__label">Garde-robe</span></a>
    <a href="reparer.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🧵</span><span class="rt-tabbar__label">Réparer</span></a>
    <a href="donner.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🎁</span><span class="rt-tabbar__label">Donner</span></a>
    <a href="marketplace.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">🏪</span><span class="rt-tabbar__label">Marketplace</span></a>
    <a href="profil.html" class="rt-tabbar__item"><span class="rt-tabbar__icon" aria-hidden="true">👤</span><span class="rt-tabbar__label">Profil</span></a>
  </nav>
</body>
</html>
